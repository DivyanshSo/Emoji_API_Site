<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CryptoView</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #e8e8e8;
    --card-bg: #ffffff;
    --accent: #5a52e0;
    --accent-dark: #4740c2;
    --text: #111111;
    --text-muted: #888;
    --orange: #f5a623;
    --down: #b0b0b0;
    --radius: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 48px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: radial-gradient(circle at 35% 35%, #f5c842, #e08c00);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(224,140,0,0.35);
  }
  .search-btn {
    border: 1.5px solid var(--orange);
    background: #fff;
    padding: 8px 22px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    color: var(--orange);
    font-weight: 500;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .search-btn:hover { background: var(--orange); color: #fff; box-shadow: 0 2px 12px rgba(245,166,35,0.3); }

  /* ── PAGE SYSTEM ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── SEARCH PAGE ── */
  .search-page {
    min-height: 100vh;
    background: var(--bg);
  }
  .search-header {
    text-align: center;
    padding: 22px 48px 16px;
    border-bottom: 1px solid #ccc;
    background: var(--bg);
  }
  .search-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--orange);
    margin-bottom: 14px;
  }
  .search-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
  }
  .search-bar input {
    padding: 9px 16px;
    border: 1px solid #bbb;
    border-radius: 6px;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    width: 280px;
    outline: none;
    background: #fff;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--orange); }
  .search-bar button {
    padding: 9px 18px;
    border: 1px solid #bbb;
    border-radius: 6px;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    background: #fff;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .search-bar button:hover { background: var(--orange); color: #fff; border-color: var(--orange); }

  /* search results */
  .search-results {
    padding: 32px 48px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .result-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .result-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .result-card .coin-logo { width: 44px; height: 44px; font-size: 22px; border-radius: 10px; background: #f0f0f0; display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .result-card .coin-info h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; }
  .result-card .coin-info .price { font-size: 0.85rem; color: var(--text-muted); margin-top: 3px; }
  .result-card .coin-info .symbol { font-size: 0.78rem; color: var(--accent); font-weight: 600; margin-top: 2px; }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    color: var(--text-muted);
    padding: 60px 0;
    font-size: 1rem;
  }

  /* ── HERO ── */
  .hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 80px 48px 60px;
    min-height: 82vh;
    position: relative;
    overflow: hidden;
  }

  .hero-left {
    max-width: 380px;
    animation: fadeUp 0.7s ease both;
  }
  .hero-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.6rem;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 14px;
  }
  .hero-left p {
    color: var(--text-muted);
    font-size: 1rem;
    line-height: 1.6;
  }

  /* floating cards */
  .cards-stack {
    position: relative;
    width: 520px;
    height: 420px;
    flex-shrink: 0;
  }
  .mini-card {
    position: absolute;
    background: #fff;
    border-radius: var(--radius);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    width: 360px;
    animation: floatCard 0.8s ease both;
  }
  .mini-card:nth-child(1) { top: 30px;   left: 80px;  animation-delay: 0.1s; }
  .mini-card:nth-child(2) { top: 155px;  left: 160px; animation-delay: 0.25s; }
  .mini-card:nth-child(3) { top: 280px;  left: 60px;  animation-delay: 0.4s; }

  .card-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  .card-icon.up   { background: var(--accent); }
  .card-icon.down { background: #c8c8c8; }

  .card-chart {
    flex: 1;
    height: 50px;
  }
  .card-chart svg { width: 100%; height: 100%; }

  .card-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    min-width: 60px;
  }
  .card-bar {
    height: 6px;
    border-radius: 3px;
    background: var(--accent);
    width: 38px;
  }
  .card-label {
    height: 6px;
    border-radius: 3px;
    background: #ddd;
    width: 54px;
  }

  /* illustrated figure */
  .hero-figure {
    position: absolute;
    right: 0; bottom: 0;
    width: 220px;
    opacity: 0.85;
    animation: fadeUp 1s ease 0.5s both;
    pointer-events: none;
  }

  /* ── TOP COINS ── */
  .coins-section {
    padding: 20px 0 60px;
    text-align: center;
  }
  .coins-section h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    color: var(--orange);
    margin-bottom: 28px;
  }
  .coins-scroll {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding: 8px 48px 16px;
    scrollbar-width: none;
  }
  .coins-scroll::-webkit-scrollbar { display: none; }

  .coin-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 220px;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .coin-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

  .coin-logo {
    width: 40px; height: 40px;
    border-radius: 8px;
    object-fit: cover;
    background: #ddd;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .coin-info h3 {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .coin-info .price {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ── FOOTER ── */
  footer {
    background: #fff;
    border-top: 1px solid #ddd;
    text-align: center;
    padding: 18px;
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes floatCard {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
  }
  .mini-card:nth-child(1) { animation: fadeUp 0.7s ease 0.1s both, float 4s ease-in-out 1s infinite; }
  .mini-card:nth-child(2) { animation: fadeUp 0.7s ease 0.25s both, float 4.5s ease-in-out 1.2s infinite; }
  .mini-card:nth-child(3) { animation: fadeUp 0.7s ease 0.4s both, float 3.8s ease-in-out 0.8s infinite; }
</style>
</head>
<body>

<!-- ══════════ HOME PAGE ══════════ -->
<div id="homePage" class="page active">

<!-- NAV -->
<nav>
  <div class="logo" style="cursor:pointer" onclick="showPage('home')">
    <div class="logo-icon">₿</div>
    CryptoView
  </div>
  <button class="search-btn" onclick="showPage('search')">Search</button>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <h1>CryptoView</h1>
    <p>A platform to view information about all cryptocurrencies live.</p>
  </div>

  <div class="cards-stack">
    <!-- Card 1: Down trend -->
    <div class="mini-card">
      <div class="card-icon down">↓</div>
      <div class="card-chart">
        <svg viewBox="0 0 160 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="0,15 20,22 40,18 60,28 80,24 100,35 120,30 140,40 160,45"
            stroke="#aaa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card-meta">
        <div class="card-label"></div>
        <div class="card-bar"></div>
      </div>
    </div>

    <!-- Card 2: Up trend strong -->
    <div class="mini-card">
      <div class="card-icon up">↑</div>
      <div class="card-chart">
        <svg viewBox="0 0 160 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="0,45 20,38 40,35 60,30 80,28 100,20 120,14 140,8 160,3"
            stroke="#333" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card-meta">
        <div class="card-label"></div>
        <div class="card-bar"></div>
      </div>
    </div>

    <!-- Card 3: Up trend mild -->
    <div class="mini-card">
      <div class="card-icon up">↑</div>
      <div class="card-chart">
        <svg viewBox="0 0 160 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="0,30 20,25 40,32 60,20 80,28 100,22 120,26 140,18 160,22"
            stroke="#333" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card-meta">
        <div class="card-label"></div>
        <div class="card-bar"></div>
      </div>
    </div>
  </div>

  <!-- Stick figure illustration (SVG inline) -->
  <svg class="hero-figure" viewBox="0 0 200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- head -->
    <circle cx="100" cy="55" r="32" fill="#f4b8a8"/>
    <!-- hair -->
    <ellipse cx="100" cy="30" rx="33" ry="18" fill="#2d2d3e"/>
    <!-- body / coat -->
    <rect x="60" y="88" width="80" height="160" rx="14" fill="#2d2d3e"/>
    <!-- inner shirt -->
    <rect x="82" y="88" width="36" height="120" rx="6" fill="#c0bfc8"/>
    <!-- left arm -->
    <rect x="28" y="90" width="32" height="110" rx="14" fill="#2d2d3e"/>
    <ellipse cx="44" cy="205" rx="14" ry="16" fill="#f4b8a8"/>
    <!-- right arm -->
    <rect x="140" y="90" width="32" height="100" rx="14" fill="#2d2d3e"/>
    <ellipse cx="156" cy="196" rx="14" ry="16" fill="#f4b8a8"/>
    <!-- legs -->
    <rect x="68" y="244" width="28" height="120" rx="12" fill="#2d2d3e"/>
    <rect x="104" y="244" width="28" height="120" rx="12" fill="#2d2d3e"/>
    <!-- shoes -->
    <ellipse cx="82" cy="366" rx="22" ry="12" fill="#111"/>
    <ellipse cx="118" cy="366" rx="22" ry="12" fill="#111"/>
    <!-- feet skin -->
    <ellipse cx="82" cy="360" rx="14" ry="10" fill="#f4b8a8"/>
    <ellipse cx="118" cy="360" rx="14" ry="10" fill="#f4b8a8"/>
  </svg>
</section>

<!-- TOP COINS -->
<section class="coins-section">
  <h2>Top Coins</h2>
  <div class="coins-scroll" id="coinsContainer">
    <!-- filled by JS -->
  </div>
</section>

<!-- FOOTER -->
<footer>
  © CryptoView | Developed by Divyansh Soni
</footer>

</div><!-- end #homePage -->

<!-- ══════════ SEARCH PAGE ══════════ -->
<div id="searchPage" class="page">
  <nav>
    <div class="logo" style="cursor:pointer" onclick="showPage('home')">
      <div class="logo-icon">₿</div>
      CryptoView
    </div>
    <button class="search-btn" onclick="showPage('search')">Search</button>
  </nav>

  <div class="search-page">
    <div class="search-header">
      <h2>Search</h2>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Enter Coin Name..." oninput="doSearch()" onkeydown="if(event.key==='Enter') doSearch()"/>
        <button onclick="doSearch()">Search</button>
      </div>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <footer>
    © CryptoView | Developed by Aayush and Team...
  </footer>
</div>

<script>
const coins = [
  { name: "PoolX Finance", symbol: "POOLX", price: "₹ 2.0714",   emoji: "🔵" },
  { name: "Veloce",        symbol: "VEXT",  price: "₹ 41.6209",  emoji: "⚡" },
  { name: "Open Campus",   symbol: "EDU",   price: "₹ 37.0314",  emoji: "🎓" },
  { name: "Synapse",       symbol: "SYN",   price: "₹ 28.1685",  emoji: "🔮" },
  { name: "Gala",          symbol: "GALA",  price: "₹ 1.3192",   emoji: "🎮" },
  { name: "Bitcoin",       symbol: "BTC",   price: "₹ 72,14,000",emoji: "₿"  },
  { name: "Ethereum",      symbol: "ETH",   price: "₹ 2,46,000", emoji: "⟠"  },
  { name: "Solana",        symbol: "SOL",   price: "₹ 13,200",   emoji: "◎"  },
  { name: "Dogecoin",      symbol: "DOGE",  price: "₹ 14.82",    emoji: "🐶" },
  { name: "Cardano",       symbol: "ADA",   price: "₹ 38.50",    emoji: "₳"  },
  { name: "Polkadot",      symbol: "DOT",   price: "₹ 580",      emoji: "●"  },
  { name: "Chainlink",     symbol: "LINK",  price: "₹ 1,140",    emoji: "🔗" },
];

// Populate home top coins
const container = document.getElementById('coinsContainer');
coins.slice(0, 7).forEach(c => {
  const div = document.createElement('div');
  div.className = 'coin-card';
  div.innerHTML = `
    <div class="coin-logo">${c.emoji}</div>
    <div class="coin-info">
      <h3>${c.name} (${c.symbol})</h3>
      <div class="price">${c.price}</div>
    </div>
  `;
  container.appendChild(div);
});

// Page navigation
function showPage(page) {
  document.getElementById('homePage').classList.toggle('active', page === 'home');
  document.getElementById('searchPage').classList.toggle('active', page === 'search');
  if (page === 'search') {
    document.getElementById('searchInput').value = '';
    renderResults(coins);
    setTimeout(() => document.getElementById('searchInput').focus(), 100);
  }
  window.scrollTo(0, 0);
}

// Search logic
function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q ? coins.filter(c =>
    c.name.toLowerCase().includes(q) || c.symbol.toLowerCase().includes(q)
  ) : coins;
  renderResults(filtered);
}

function renderResults(list) {
  const el = document.getElementById('searchResults');
  if (!list.length) {
    el.innerHTML = '<div class="no-results">No coins found. Try a different name.</div>';
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="result-card">
      <div class="coin-logo">${c.emoji}</div>
      <div class="coin-info">
        <h3>${c.name}</h3>
        <div class="symbol">${c.symbol}</div>
        <div class="price">${c.price}</div>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
