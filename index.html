<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emoji Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2ff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #534AB7, #8b5cf6);
      color: white;
      text-align: center;
      padding: 2rem 1rem 1.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    header p {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 1.2rem;
    }

    .search-wrap {
      position: relative;
      max-width: 500px;
      margin: 0 auto;
    }

    .search-wrap input {
      width: 100%;
      padding: 12px 18px 12px 46px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      outline: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      color: #333;
    }

    .search-wrap input::placeholder { color: #aaa; }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
    }

    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .count-label {
      font-size: 13px;
      color: #666;
    }

    .count-badge {
      background: #534AB7;
      color: white;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .category-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 1.2rem;
      scrollbar-width: none;
    }

    .category-scroll::-webkit-scrollbar { display: none; }

    .cat-btn {
      white-space: nowrap;
      padding: 6px 16px;
      border: 1.5px solid #d0ccf5;
      border-radius: 20px;
      background: white;
      color: #666;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .cat-btn:hover { background: #ede9ff; color: #534AB7; border-color: #a8a0e8; }
    .cat-btn.active { background: #534AB7; border-color: #534AB7; color: white; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }

    .emoji-card {
      background: white;
      border-radius: 14px;
      padding: 14px 8px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      border: 1.5px solid #e8e6f8;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position: relative;
      overflow: hidden;
    }

    .emoji-card:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 24px rgba(83,74,183,0.18);
      border-color: #a8a0e8;
    }

    .emoji-card:active { transform: scale(0.96); }

    .emoji-char {
      font-size: 32px;
      line-height: 1;
      transition: transform 0.2s;
    }

    .emoji-card:hover .emoji-char { transform: scale(1.25) rotate(-8deg); }

    .emoji-name {
      font-size: 10px;
      color: #888;
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
    }

    .emoji-card.copied::after {
      content: '✓ Copied!';
      position: absolute;
      inset: 0;
      background: rgba(83,74,183,0.9);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      border-radius: 13px;
      animation: fadeOut 1s forwards;
    }

    @keyframes fadeOut {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .shimmer {
      background: linear-gradient(90deg, #e8e6f8 25%, #f5f4ff 50%, #e8e6f8 75%);
      background-size: 200%;
      animation: shimmer 1.2s infinite;
      border-radius: 14px;
      height: 100px;
    }

    @keyframes shimmer {
      0%   { background-position: 200%; }
      100% { background-position: -200%; }
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: #999;
    }

    .empty .big { font-size: 56px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }
    .empty small { font-size: 12px; color: #bbb; margin-top: 4px; display: block; }

    .tooltip {
      position: fixed;
      background: #1e1e2e;
      color: #ede9ff;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 11px;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -130%);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .tooltip.show { opacity: 1; }
  </style>
</head>
<body>

  <header>
    <h1>✨ Emoji Explorer</h1>
    <p>Click any emoji to copy it · Search by name or category</p>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search emojis… e.g. smile, fire, heart" autocomplete="off" />
    </div>
  </header>

  <div class="main">
    <div class="top-bar">
      <span class="count-label" id="count-label">Loading emojis…</span>
      <span class="count-badge" id="count-badge">—</span>
    </div>

    <div class="category-scroll" id="cats"></div>
    <div id="grid"></div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const EMOJI_URL = 'https://akhil-06.github.io/emoji_project/emojiList.js';

    let allEmojis = [];
    let activeCategory = 'All';
    let searchQuery = '';

    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('search');
    const countLabel = document.getElementById('count-label');
    const countBadge = document.getElementById('count-badge');
    const catsEl = document.getElementById('cats');
    const tooltip = document.getElementById('tooltip');

    // --- Shimmer skeleton while loading ---
    function showShimmer() {
      grid.innerHTML = Array(24).fill(0).map(() => `<div class="shimmer"></div>`).join('');
    }

    // --- Fetch emoji data from external JS file ---
    async function loadEmojis() {
      showShimmer();
      try {
        const res = await fetch(EMOJI_URL);
        const text = await res.text();
        const match = text.match(/=\s*(\[[\s\S]*\])/);
        if (match) {
          allEmojis = JSON.parse(match[1]);
        }
      } catch (e) {
        console.warn('Fetch failed, using fallback data');
        allEmojis = getFallback();
      }
      buildCategories();
      render();
    }

    // --- Fallback data if fetch fails ---
    function getFallback() {
      return [
        {name:"Grinning Face",emoji:"😀",category:"Smileys & Emotion"},
        {name:"Face with Tears of Joy",emoji:"😂",category:"Smileys & Emotion"},
        {name:"Heart Eyes",emoji:"😍",category:"Smileys & Emotion"},
        {name:"Winking Face",emoji:"😉",category:"Smileys & Emotion"},
        {name:"Thinking Face",emoji:"🤔",category:"Smileys & Emotion"},
        {name:"Partying Face",emoji:"🥳",category:"Smileys & Emotion"},
        {name:"Sunglasses Face",emoji:"😎",category:"Smileys & Emotion"},
        {name:"Fire",emoji:"🔥",category:"Symbols"},
        {name:"Star",emoji:"⭐",category:"Symbols"},
        {name:"Red Heart",emoji:"❤️",category:"Symbols"},
        {name:"Sparkles",emoji:"✨",category:"Symbols"},
        {name:"Thumbs Up",emoji:"👍",category:"People & Body"},
        {name:"Clapping Hands",emoji:"👏",category:"People & Body"},
        {name:"Raised Hands",emoji:"🙌",category:"People & Body"},
        {name:"Dog",emoji:"🐶",category:"Animals & Nature"},
        {name:"Cat",emoji:"🐱",category:"Animals & Nature"},
        {name:"Sunflower",emoji:"🌻",category:"Animals & Nature"},
        {name:"Rainbow",emoji:"🌈",category:"Animals & Nature"},
        {name:"Pizza",emoji:"🍕",category:"Food & Drink"},
        {name:"Burger",emoji:"🍔",category:"Food & Drink"},
        {name:"Rocket",emoji:"🚀",category:"Travel & Places"},
        {name:"Car",emoji:"🚗",category:"Travel & Places"},
        {name:"Laptop",emoji:"💻",category:"Objects"},
        {name:"Trophy",emoji:"🏆",category:"Objects"},
      ];
    }

    // --- Build category filter buttons ---
    function buildCategories() {
      const cats = ['All', ...new Set(allEmojis.map(e => e.category).filter(Boolean))];
      catsEl.innerHTML = cats.map(c =>
        `<button class="cat-btn${c === 'All' ? ' active' : ''}" data-cat="${c}">${c}</button>`
      ).join('');

      catsEl.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.cat;
          catsEl.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          render();
        });
      });
    }

    // --- Filter logic (search + category) ---
    function getFiltered() {
      const q = searchQuery.toLowerCase().trim();
      return allEmojis.filter(e => {
        const matchSearch = !q ||
          (e.name || '').toLowerCase().includes(q) ||
          (e.category || '').toLowerCase().includes(q) ||
          (e.emoji || '').includes(q);
        const matchCat = activeCategory === 'All' || e.category === activeCategory;
        return matchSearch && matchCat;
      });
    }

    // --- Render emoji grid ---
    function render() {
      const filtered = getFiltered();
      countBadge.textContent = filtered.length;
      countLabel.textContent = searchQuery
        ? `Results for "${searchQuery}"`
        : 'Total emojis';

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            <div class="big">🔭</div>
            <p>No emojis found for "<strong>${searchQuery}</strong>"</p>
            <small>Try a different keyword</small>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map(e => `
        <div class="emoji-card" data-emoji="${e.emoji}" data-name="${e.name || ''}">
          <span class="emoji-char">${e.emoji}</span>
          <span class="emoji-name">${(e.name || '').toLowerCase()}</span>
        </div>
      `).join('');

      // Click to copy
      grid.querySelectorAll('.emoji-card').forEach(card => {
        card.addEventListener('click', () => {
          navigator.clipboard.writeText(card.dataset.emoji).catch(() => {});
          card.classList.add('copied');
          setTimeout(() => card.classList.remove('copied'), 1050);
        });

        // Tooltip on hover
        card.addEventListener('mouseenter', () => {
          tooltip.textContent = card.dataset.name;
          tooltip.classList.add('show');
        });
        card.addEventListener('mousemove', e => {
          tooltip.style.left = e.clientX + 'px';
          tooltip.style.top  = e.clientY + 'px';
        });
        card.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
      });
    }

    // --- Search input with debounce ---
    let debounceTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        searchQuery = searchInput.value;
        render();
      }, 180);
    });

    // --- Start ---
    loadEmojis();
  </script>

</body>
</html>
